schema_version: 1
kind: skill
name: update-tool
description: 更新、升级、追踪或审核 `tools/<tool_id>/` 下已有工具时使用。适用于按 `tool_type` 区分内置工具与外置工具，依据 `resource.yaml -> source/current_version/install_dir` 查询上游、执行升级，并同步更新 `toolskills/SKILL.md`、版本说明和治理信息。
trigger:
  keywords:
    - 更新工具
    - 升级工具
    - tool update
    - update-tool
    - 同步上游
    - 查询最新版本
    - 更新 toolskill
    - 升级 vendored 工具
    - 更新外置工具
    - install_dir
  always: false
requires:
  tools:
    - filesystem
  bins: []
  env: []
content:
  main: SKILL.md
exposure:
  agent: true
  main_runtime: true
