schema_version: 1
kind: skill
name: context-management-strategy
description: >
  统一的上下文管理策略，指导 G3KU Agent 在复杂任务中管理上下文窗口：
  保存、恢复、预算控制、范围标注、上下文驱动开发等。
  与 memory skill 和 stage 机制协作，防止上下文溢出和信息丢失。
trigger:
  keywords:
    - context management strategy
    - 上下文管理策略
    - context save
    - context restore
    - context budget
    - context checkpoint
    - context recovery
    - context compaction
    - 上下文保存
    - 上下文恢复
    - 上下文预算
    - context scope
    - context trimming
    - session continuity
  descriptions:
    - 当会话上下文接近容量限制时需要管理
    - 在执行高风险操作前需要保存上下文状态
    - 会话压缩后需要恢复工作上下文
    - 需要跨会话保持项目连续性
    - 需要控制上下文大小以优化 token 成本
requires:
  tools:
    - memory
    - submit_next_stage
    - spawn_child_nodes
  bins: []
  env: []
exposure:
  agent: true
  main_runtime: true
governance:
  maintainer: G3KU Team
  origin: local-created
  review_required_for:
    - 结构变更（新增/删除 references 文件）
    - 策略级别变更（预算阈值调整、裁剪规则变更）
    - 协作策略变更（memory 系统接口变动）
  minor_tuning_allowed:
    - 措辞优化（不改变规则实质）
    - 示例补充
    - 格式调整
