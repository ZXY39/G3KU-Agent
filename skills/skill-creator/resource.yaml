schema_version: 1
kind: skill
name: skill-creator
description: 面向 G3KU 创建、更新、迁移和校验 `skills/` 与 `tools/` 资源；提供两条明确工作流：一条用于创建 `skills/<skill_id>/`，一条用于接入 `tools/<tool_id>/`。也可把工作流描述、代码、文档、链接、PDF 或现有 skill/tool 转成适配 G3KU 的 skill 或 tool，并在需要时生成可导出的开放标准 SKILL.md 技能。适用于创建 skill、接入 tool、封装现有 CLI 或仓库、自动化重复流程、设计多 agent skill 套件、校验或导出 skill。若用户只是要从 GitHub repo/path 安装现成 skill，应优先调用 `skill-installer` 工具；若用户要从 ClawHub 搜索、下载或更新 skill，则转用 `clawhub-skill-manager`，并先评估上游第三方 skill 是否需要按 G3KU 要求重写后再使用。
trigger:
  keywords:
    - skill-creator
    - agent-skill-creator
    - 创建技能
    - 创建 skill
    - 新建 skill
    - 接入 tool
    - 接入工具
    - 创建工具
    - 新增工具
    - 封装 CLI
    - 自动化流程
    - automate workflow
    - validate skill
    - export skill
    - migrate skill
    - 多 agent
    - skill factory
  always: false
requires:
  tools:
    - filesystem
    - exec
  bins: []
  env: []
content:
  main: SKILL.md
  references: references
  scripts: scripts
exposure:
  agent: true
  main_runtime: true
