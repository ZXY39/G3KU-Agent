schema_version: 1
kind: skill
name: add-tool
description: 新增、迁移、合并、重构或审核 `tools/<tool_id>/` 下的工具资源时使用。适用于内置工具与外置工具双模式注册，重点覆盖 `tool_type`、`install_dir`、`resource.yaml`、`toolskills/SKILL.md`、安装/更新流程与删除安全原则。
trigger:
  keywords:
    - 添加工具
    - 新增工具
    - 创建工具
    - MCP 工具
    - toolskill
    - 开源工具接入
    - 接入工具
    - 包装 CLI
    - 外置工具
    - 内置工具
    - install_dir
  always: false
requires:
  tools:
    - filesystem
  bins: []
  env: []
content:
  main: SKILL.md
exposure:
  agent: true
  main_runtime: true
