schema_version: 1
kind: skill
name: add-tool
description: 新增、迁移、合并或审查 `tools/<tool_id>/` 下的标准工具资源时使用。适用于编写符合当前仓库规范的 MCP 工具：`resource.yaml` 定义元数据与参数契约，`main/tool.py` 放工具本体，`toolskills/SKILL.md` 放工具使用说明。
trigger:
  keywords:
    - 添加工具
    - 新增工具
    - 创建工具
    - MCP 工具
    - toolskill
  always: false
requires:
  tools:
    - filesystem
  bins: []
  env: []
content:
  main: SKILL.md
exposure:
  agent: true
  main_runtime: true
