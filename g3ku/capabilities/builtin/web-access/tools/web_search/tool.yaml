schema_version: 1
name: web_search
label: web_search
description: Search the web
entrypoint: g3ku.capabilities.builtin_factories:build_web_search
permissions:
  network: true
streaming: false
admin_only: false
governance:
  family: web_access
  actions:
    - id: search
      label: Web Search
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - execution
      match:
        kind: static


