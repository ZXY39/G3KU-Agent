schema_version: 1
name: web_fetch
label: web_fetch
description: Fetch a web page
entrypoint: g3ku.capabilities.builtin_factories:build_web_fetch
permissions:
  network: true
streaming: false
admin_only: false
governance:
  family: web_access
  actions:
    - id: fetch
      label: Web Fetch
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - execution
      match:
        kind: static


