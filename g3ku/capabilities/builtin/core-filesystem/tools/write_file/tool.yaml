schema_version: 1
name: write_file
label: write_file
description: Write content to a file
entrypoint: g3ku.capabilities.builtin_factories:build_write_file
permissions:
  network: false
  filesystem:
    - workspace
streaming: false
admin_only: false
governance:
  family: filesystem
  actions:
    - id: create
      label: Create File
      risk_level: medium
      destructive: true
      allowed_roles:
        - ceo
        - execution
        - execution
      match:
        kind: filesystem_existence
        path_param: path
        when: missing
    - id: write
      label: Overwrite File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
      match:
        kind: filesystem_existence
        path_param: path
        when: exists


