schema_version: 1
name: edit_file
label: edit_file
description: Edit a file by replacing exact text
entrypoint: g3ku.capabilities.builtin_factories:build_edit_file
permissions:
  network: false
  filesystem:
    - workspace
streaming: false
admin_only: false
governance:
  family: filesystem
  actions:
    - id: edit
      label: Edit File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
      match:
        kind: static

