schema_version: 1
kind: tool
name: filesystem_open
display_name: Filesystem Open
description: Open a local file excerpt.
tool_result_delivery_contract: runtime_managed
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: Absolute file path to open.
    start_line:
      type: integer
      description: Optional start line.
    end_line:
      type: integer
      description: Optional end line.
    around_line:
      type: integer
      description: Optional center line.
    window:
      type: integer
      description: Optional window size when `around_line` is set.
  required:
    - path
governance:
  family: filesystem
  display_name: Filesystem
  description: Describe, search, open, list, write, edit, delete, and patch local files.
  actions:
    - id: open
      label: Open File Excerpt
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true

