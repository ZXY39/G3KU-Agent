schema_version: 1
kind: tool
name: memory_write
description: Write explicit permanent memory items and make them searchable for future retrieval.
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Repository-managed structured memory write tool for explicit CEO long-term memory saves.
  compare_rule: Treat changes in main implementation, parameters, permissions, settings, or return payload shape as version changes.
  source_of_truth: This resource.yaml and the main implementation are authoritative; toolskills supplement usage guidance when present.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    facts:
      type: array
      description: One to five structured memory facts to upsert immediately.
      items:
        type: object
        properties:
          category:
            type: string
            enum:
              - constraint
              - default_setting
              - historical_fact
              - identity
              - preference
              - relationship
              - stateful_fact
              - workflow_rule
            description: Structured fact category.
          scope:
            type: string
            description: Namespace scope for the fact (e.g. global, session, project).
          entity:
            type: string
            description: Entity the fact is about (e.g. user, project:g3ku).
          attribute:
            type: string
            description: Attribute name for the entity (stable key within the entity).
          value:
            type:
              - string
              - number
              - boolean
              - object
              - array
              - 'null'
            description: Canonical value for the fact (string/number/bool/object/array).
          observed_at:
            type: string
            description: ISO8601 timestamp when the fact was observed (or recorded).
          time_semantics:
            type: string
            enum:
              - current_state
              - durable_until_replaced
              - historical_observation
            description: How the fact should be interpreted over time.
          source_excerpt:
            type: string
            description: Short excerpt from the current user turn supporting this fact.
          qualifier:
            type: object
            description: Optional qualifier metadata (e.g. project context, constraints).
          expires_at:
            type:
              - string
              - 'null'
            description: Optional ISO8601 expiry timestamp (null for no expiry).
        required:
          - category
          - scope
          - entity
          - attribute
          - value
          - observed_at
          - time_semantics
          - source_excerpt
  required:
    - facts
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
