schema_version: 1
kind: tool
name: filesystem
display_name: Filesystem
description: Compatibility wrapper for the legacy multi-action filesystem tool.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: "Current version is defined by this manifest plus the Python implementation in `main/`."
  compare_rule: "Bump the version when behavior, parameters, permissions, settings, or return contracts change."
  source_of_truth: "`resource.yaml` and `main/` are authoritative; `toolskills/` adds usage guidance only."
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
settings:
  restrict_to_workspace: false
  search_timeout_seconds: 3.0
  search_max_files: 400
  search_max_bytes: 10000000
  edit_validation_enabled: true
  edit_validation_timeout_seconds: 20
  edit_validation_rollback_on_failure: true
  edit_validation_default_commands: []
  edit_validation_commands_by_ext:
    .py:
      - python -m py_compile {path}
  write_validation_enabled: true
  write_validation_timeout_seconds: 20
  write_validation_rollback_on_failure: true
  write_validation_default_commands: []
  write_validation_commands_by_ext:
    .py:
      - python -m py_compile {path}
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
        - describe
        - search
        - open
        - head
        - tail
        - list
        - write
        - edit
        - delete
        - propose_patch
      description: Filesystem action to execute.
    path:
      type: string
      description: Absolute target path.
    query:
      type: string
      description: Search query for `action=search`.
    limit:
      type: integer
      description: Max hits for `action=search`.
    before:
      type: integer
      description: Context lines before each file hit for `action=search`.
    after:
      type: integer
      description: Context lines after each file hit for `action=search`.
    start_line:
      type: integer
      description: Start line for `action=open` or line-range `action=edit`.
    end_line:
      type: integer
      description: End line for `action=open` or line-range `action=edit`.
    around_line:
      type: integer
      description: Center line for `action=open`.
    window:
      type: integer
      description: Window size for `action=open` with `around_line`.
    lines:
      type: integer
      description: Line count for `action=head` or `action=tail`.
    content:
      type: string
      description: File content for `action=write`.
    old_text:
      type: string
      description: Existing text for text-replace `action=edit` or `action=propose_patch`.
    new_text:
      type: string
      description: Replacement text for text-replace `action=edit` or `action=propose_patch`.
    replacement:
      type: string
      description: Replacement text for line-range `action=edit`.
    summary:
      type: string
      description: Optional patch summary for `action=propose_patch`.
  required:
    - action
    - path
governance:
  family: filesystem
  display_name: Filesystem
  description: Describe, search, open, list, write, edit, delete, and patch local files.
  actions:
    - id: describe
      label: Describe File
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: search
      label: Search Path
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: open
      label: Open File Excerpt
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: head
      label: Open File Head
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: tail
      label: Open File Tail
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: list
      label: List Directory
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: write
      label: Write File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
        - execution
    - id: edit
      label: Edit File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
        - execution
    - id: delete
      label: Delete File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
    - id: propose_patch
      label: Propose Patch
      risk_level: medium
      destructive: false
      allowed_roles:
        - ceo
        - execution
compatibility:
  legacy_wrapper: true
  preferred_direct_tool: false
exposure:
  agent: false
  main_runtime: true
toolskill:
  enabled: true

