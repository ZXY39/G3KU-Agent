schema_version: 1
kind: tool
name: filesystem
display_name: Filesystem
description: Describe, search, and open workspace files by local excerpt, plus write, edit, delete, and patch actions.
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: 当前版本表示仓库内置实现；更新时需同步代码、参数契约和资源描述。
  compare_rule: 以 main/ 实现、parameters、permissions、settings 或返回结构变化为准；仅修改 toolskills 文案不单独视为版本升级。
  source_of_truth: 以当前目录下的 resource.yaml 与 main/ 实现为准；如存在 toolskills/，其内容用于补充使用说明。
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
settings:
  restrict_to_workspace: true
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
        - describe
        - search
        - open
        - head
        - tail
        - list
        - write
        - edit
        - delete
        - propose_patch
      description: Filesystem action to execute.
    path:
      type: string
      description: Target file or directory path. Relative paths resolve from workspace.
    query:
      type: string
      description: Required when action=search.
    limit:
      type: integer
      description: Optional max hits when action=search.
    before:
      type: integer
      description: Optional context lines before each hit when action=search.
    after:
      type: integer
      description: Optional context lines after each hit when action=search.
    start_line:
      type: integer
      description: Optional start line when action=open.
    end_line:
      type: integer
      description: Optional end line when action=open.
    around_line:
      type: integer
      description: Optional center line when action=open.
    window:
      type: integer
      description: Optional window size when action=open with around_line.
    lines:
      type: integer
      description: Optional line count when action=head or action=tail.
    content:
      type: string
      description: Required when action=write.
    old_text:
      type: string
      description: Required when action=edit or action=propose_patch. Must match exactly once.
    new_text:
      type: string
      description: Replacement text for action=edit or action=propose_patch.
    summary:
      type: string
      description: Optional patch summary when action=propose_patch.
  required:
    - action
    - path
governance:
  family: filesystem
  display_name: Filesystem
  description: Describe, search, and open workspace files by local excerpt, plus write, edit, delete, and patch actions.
  actions:
    - id: describe
      label: Describe File
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: search
      label: Search File
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: open
      label: Open File Excerpt
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: head
      label: Open File Head
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: tail
      label: Open File Tail
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: list
      label: List Directory
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
    - id: write
      label: Write File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
        - execution
    - id: edit
      label: Edit File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
        - execution
    - id: delete
      label: Delete File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
    - id: propose_patch
      label: Propose Patch
      risk_level: medium
      destructive: false
      allowed_roles:
        - ceo
        - execution
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
