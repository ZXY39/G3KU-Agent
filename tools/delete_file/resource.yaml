schema_version: 1
kind: tool
name: delete_file
description: Delete a file at the given path.
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: The file path to delete
  required:
  - path
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
