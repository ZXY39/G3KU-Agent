schema_version: 1
kind: tool
name: exec
description: Execute shell commands with workspace-relative defaults and return structured summaries plus content refs.
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: 当前版本表示仓库内置实现；更新时需同步代码、参数契约和资源描述。
  compare_rule: 以 main/ 实现、parameters、permissions、settings 或返回结构变化为准；仅修改 toolskills 文案不单独视为版本升级。
  source_of_truth: 以当前目录下的 resource.yaml 与 main/ 实现为准；如存在 toolskills/，其内容用于补充使用说明。
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
settings:
  timeout: 60
  path_append: ''
  restrict_to_workspace: false
parameters:
  type: object
  properties:
    command:
      type: string
      description: Shell command to execute.
    working_dir:
      type: string
      description: Optional working directory override. Relative paths resolve from workspace. Absolute paths are allowed unless restrict_to_workspace is enabled.
  required:
    - command
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
