schema_version: 1
kind: tool
name: exec
description: Execute shell commands inside the workspace runtime.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
settings:
  timeout: 60
  path_append: ''
  restrict_to_workspace: false
parameters:
  type: object
  properties:
    command:
      type: string
      description: Shell command to execute.
    working_dir:
      type: string
      description: Optional working directory override.
  required:
    - command
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
