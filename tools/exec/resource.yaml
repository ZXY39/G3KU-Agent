schema_version: 1
kind: tool
name: exec
description: Execute read-only shell commands with structured summaries plus content
  refs. Commands run in the host shell and default to the task-scoped temp directory
  when the runtime provides `task_temp_dir`, unless an explicit working_dir is provided.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local exec tool. The manifest, handler, and read-only execution
    contract together define the current behavior.
  compare_rule: Treat manifest, main/, parameter contract, permissions, settings,
    and returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective
    behavior.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
settings:
  timeout: 60
  path_append: ''
  restrict_to_workspace: false
  enable_safety_guard: false
parameters:
  type: object
  properties:
    command:
      type: string
      description: Read-only shell command to execute. Use this for local inspection
        and searching only; any filesystem creation, modification, deletion, rename,
        move, or patch workflow must use filesystem_write/edit/delete/propose_patch
        instead.
    working_dir:
      type: string
      description: Optional working directory override. Provide an absolute path when
        you need a specific directory. If omitted, exec defaults to `runtime_environment.task_temp_dir`
        when that runtime field is available; otherwise it falls back to the process
        default cwd. When restrict_to_workspace is enabled, working_dir must stay
        inside the workspace.
  required:
  - command
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
