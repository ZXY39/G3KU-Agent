schema_version: 1
kind: tool
name: exec
description: 执行 shell 命令并返回输出。请谨慎使用。
config_namespace: tools.exec
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    command:
      type: string
      description: 要执行的 shell 命令
    working_dir:
      type: string
      description: 可选：命令的工作目录
  required:
  - command
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
