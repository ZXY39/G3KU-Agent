  filesystem:
    - workspace
settings:
  timeout: 60
  path_append: ''
  restrict_to_workspace: false
  enable_safety_guard: false
parameters:
  type: object
  properties:
    command:
      type: string
      description: Read-only shell command to execute. Use this for local inspection and searching only; any filesystem creation, modification, deletion, rename, move, or patch workflow must use filesystem_write/edit/delete/propose_patch instead.
    working_dir:
      type: string
      description: Optional working directory override. Provide an absolute path when you need a specific directory. If omitted, exec defaults to `runtime_environment.task_temp_dir` when that runtime field is available; otherwise it falls back to the process default cwd. When restrict_to_workspace is enabled, working_dir must stay inside the workspace.
