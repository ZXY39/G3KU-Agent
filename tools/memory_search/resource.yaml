schema_version: 1
kind: tool
name: memory_search
description: Search long-term memory and return grouped and ranked results.
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: 当前版本表示仓库内置实现；更新时需同步代码、参数契约和资源描述。
  compare_rule: 以 main/ 实现、parameters、permissions、settings 或返回结构变化为准；仅修改 toolskills 文案不单独视为版本升级。
  source_of_truth: 以当前目录下的 resource.yaml 与 main/ 实现为准；如存在 toolskills/，其内容用于补充使用说明。
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
settings:
  default_limit: 8
parameters:
  type: object
  properties:
    query:
      type: string
      description: Concrete lookup query with entities and intent.
    limit:
      type: integer
      description: Maximum number of unified ranked results.
      minimum: 1
      maximum: 20
    context_type:
      type: string
      enum:
        - memory
        - resource
        - skill
      description: Optional context type filter.
    include_l2:
      type: boolean
      description: Include L2 preview snippets when available.
    session:
      type: string
      description: Optional session key override, for example cli:direct.
  required:
    - query
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
