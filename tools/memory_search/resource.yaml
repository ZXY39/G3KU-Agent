schema_version: 1
kind: tool
name: memory_search
description: Search long-term memory and return grouped and ranked results.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local memory search tool. The manifest, handler, and returned
    payload contract together define the current behavior.
  compare_rule: Treat manifest, main/, parameter contract, permissions, settings,
    and returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective
    behavior.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
settings:
  default_limit: 8
parameters:
  type: object
  properties:
    query:
      type: string
      description: Concrete lookup query with entities and intent.
    limit:
      type: integer
      description: Maximum number of unified ranked results.
      minimum: 1
      maximum: 20
    context_type:
      type: string
      enum:
      - memory
      - resource
      - skill
      description: Optional context type filter.
    include_l2:
      type: boolean
      description: Include L2 preview snippets when available.
    session:
      type: string
      description: Optional session key override, for example cli:direct.
  required:
  - query
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
