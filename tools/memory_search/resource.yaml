schema_version: 1
kind: tool
name: memory_search
description: Search long-term memory and return grouped and ranked results.
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: ?????????????????
  compare_rule: ???????????????????????????????toolskill ????????????????
  source_of_truth: ????????????resource.yaml ? toolskills ?????
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
settings:
  default_limit: 8
parameters:
  type: object
  properties:
    query:
      type: string
      description: Concrete lookup query with entities and intent.
    limit:
      type: integer
      description: Maximum number of unified ranked results.
      minimum: 1
      maximum: 20
    context_type:
      type: string
      enum:
        - memory
