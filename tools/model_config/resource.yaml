schema_version: 1
kind: tool
name: model_config
description: Manage .g3ku/config.json model catalog and role model chains. Supports
  listing models, adding/updating models, enabling/disabling models, and setting ordered
  fallback chains for ceo/execution/inspection scopes.
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
      - list_models
      - get_model
      - add_model
      - update_model
      - enable_model
      - disable_model
      - set_scope_chain
      description: Model config action to perform.
    key:
      type: string
      description: Managed model key.
    provider_model:
      type: string
      description: Provider:model identifier or managed model reference.
    api_key:
      type: string
      description: API key for add/update operations.
    api_base:
      type: string
      description: API base URL for add/update operations.
    extra_headers:
      type: object
      description: Optional extra headers for this model.
    enabled:
      type: boolean
      description: Optional enabled flag for add/update actions.
    max_tokens:
      type: integer
      description: Optional max output token cap for this model.
    temperature:
      type: number
      description: Optional default temperature for this model.
    reasoning_effort:
      type: string
      description: Optional reasoning effort override.
    retry_on:
      type: array
      items:
        type: string
      description: Retry triggers such as network, 429, 5xx.
    description:
      type: string
      description: Optional human-readable description.
    scopes:
      type: array
      items:
        type: string
      description: Scopes for add_model, e.g. ceo, execution, inspection.
    scope:
      type: string
      description: Target scope for set_scope_chain.
    model_keys:
      type: array
      items:
        type: string
      description: Ordered model keys for set_scope_chain.
  required:
  - action
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
