schema_version: 1
kind: tool
name: model_config
description: 管理 .g3ku/config.json 的模型目录、Provider 模板/草稿/绑定，以及 ceo/execution/inspection 的有序回退链。
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: 当前版本表示仓库内置实现；更新时需同步代码、参数契约和资源描述。
  compare_rule: 以 main/ 实现、parameters、permissions、settings 或返回结构变化为准；仅修改 toolskills 文案不单独视为版本升级。
  source_of_truth: 以当前目录下的 resource.yaml 与 main/ 实现为准；如存在 toolskills/，其内容用于补充使用说明。
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
      - list_templates
      - get_template
      - validate_draft
      - probe_draft
      - create_binding
      - update_binding
      - migrate_legacy
      - list_models
      - get_model
      - add_model
      - update_model
      - enable_model
      - disable_model
      - set_scope_chain
      description: 要执行的模型配置动作。
    key:
      type: string
      description: 受管模型 key。
    provider_model:
      type: string
      description: Provider:model 标识符或受管模型引用。
    api_key:
      type: string
      description: add/update 操作的 API key。
    api_base:
      type: string
      description: add/update 操作的 API base URL。
    extra_headers:
      type: object
      description: 可选：该模型的额外请求头。
    provider_id:
      type: string
      description: Provider 模板 id，用于 get_template。
    draft:
      type: object
      description: LLM 配置草稿，用于 validate_draft、probe_draft、create_binding、update_binding。
    binding:
      type: object
      description: 绑定载荷，包含 key/config_id/enabled/retry 等字段，用于 create_binding。
    enabled:
      type: boolean
      description: 可选：add/update 的 enabled 标记。
    max_tokens:
      type: integer
      description: 可选：该模型的最大输出 token 上限。
    temperature:
      type: number
      description: 可选：该模型默认 temperature。
    reasoning_effort:
      type: string
      description: 可选：推理强度覆盖值。
    retry_on:
      type: array
      items:
        type: string
      description: 重试触发条件，如 network、429、5xx。
    retry_count:
      type: integer
      description: 在同一模型上允许的可重试失败次数，超过后再进入回退链。
    description:
      type: string
      description: 可选：人类可读的描述。
    scopes:
      type: array
      items:
        type: string
      description: add_model 的作用域，例如 ceo、execution、inspection。
    scope:
      type: string
      description: set_scope_chain 的目标作用域。
    model_keys:
      type: array
      items:
        type: string
      description: set_scope_chain 的有序模型 key 列表。
  required:
  - action
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
