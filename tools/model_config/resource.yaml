schema_version: 1
kind: tool
name: model_config
description: 管理 .g3ku/config.json 的模型目录与角色模型链。支持列出模型、添加/更新、启用/禁用，以及设置 ceo/execution/inspection 的有序回退链。
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
      - list_models
      - get_model
      - add_model
      - update_model
      - enable_model
      - disable_model
      - set_scope_chain
      description: 要执行的模型配置动作。
    key:
      type: string
      description: 受管模型 key。
    provider_model:
      type: string
      description: Provider:model 标识符或受管模型引用。
    api_key:
      type: string
      description: add/update 操作的 API key。
    api_base:
      type: string
      description: add/update 操作的 API base URL。
    extra_headers:
      type: object
      description: 可选：该模型的额外请求头。
    enabled:
      type: boolean
      description: 可选：add/update 的 enabled 标记。
    max_tokens:
      type: integer
      description: 可选：该模型的最大输出 token 上限。
    temperature:
      type: number
      description: 可选：该模型默认 temperature。
    reasoning_effort:
      type: string
      description: 可选：推理强度覆盖值。
    retry_on:
      type: array
      items:
        type: string
      description: 重试触发条件，如 network、429、5xx。
    description:
      type: string
      description: 可选：人类可读的描述。
    scopes:
      type: array
      items:
        type: string
      description: add_model 的作用域，例如 ceo、execution、inspection。
    scope:
      type: string
      description: set_scope_chain 的目标作用域。
    model_keys:
      type: array
      items:
        type: string
      description: set_scope_chain 的有序模型 key 列表。
  required:
  - action
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
