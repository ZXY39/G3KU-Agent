schema_version: 1
kind: tool
name: model_config
description: Manage `.g3ku/config.json`, provider templates, drafts, bindings, and the ordered fallback chain for `ceo` / `execution` / `inspection`.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local model configuration tool. The manifest, handler, and configuration contract together define the current behavior.
  compare_rule: Treat manifest, main/, parameter contract, permissions, settings, and returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
      - list_templates
      - get_template
      - validate_draft
      - probe_draft
      - create_binding
      - update_binding
      - migrate_legacy
      - list_models
      - get_model
      - add_model
      - update_model
      - enable_model
      - disable_model
      - set_scope_chain
      description: Model configuration action to execute.
    key:
      type: string
      description: Managed model key.
    provider_model:
      type: string
      description: "`provider:model` identifier or managed model reference."
    api_key:
      type: string
      description: API key for `add_model` or `update_model`.
    api_base:
      type: string
      description: API base URL for `add_model` or `update_model`.
    extra_headers:
      type: object
      description: Optional additional request headers for the model.
    provider_id:
      type: string
      description: Provider template id used by `get_template`.
    draft:
      type: object
      description: LLM configuration draft used by `validate_draft`, `probe_draft`, `create_binding`, or `update_binding`.
    binding:
      type: object
      description: Binding payload, including fields such as `key`, `config_id`, `enabled`, and retry settings, used by `create_binding` or `update_binding`.
    enabled:
      type: boolean
      description: Optional `enabled` flag for add/update actions.
    max_tokens:
      type: integer
      description: Optional maximum output token limit for the model.
    temperature:
      type: number
      description: Optional default `temperature` override for the model.
    reasoning_effort:
      type: string
      description: Optional reasoning-effort override.
    retry_on:
      type: array
      items:
        type: string
      description: Retry trigger classes, for example `network`, `429`, or `5xx`.
    retry_count:
      type: integer
      description: How many retries are allowed on the same model before the runtime falls through to the next fallback.
    description:
      type: string
      description: Optional human-readable description.
    scopes:
      type: array
      items:
        type: string
      description: Scopes for `add_model`, for example `ceo`, `execution`, or `inspection`.
    scope:
      type: string
      description: Target scope for `set_scope_chain`.
    model_keys:
      type: array
      items:
        type: string
      description: Ordered model key list for `set_scope_chain`.
  required:
  - action
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
