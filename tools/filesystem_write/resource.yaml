schema_version: 1
kind: tool
name: filesystem_write
display_name: Filesystem Write
description: Write file content to disk.
tool_result_delivery_contract: runtime_managed
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
settings:
  restrict_to_workspace: false
  write_validation_enabled: true
  write_validation_timeout_seconds: 20
  write_validation_rollback_on_failure: true
  write_validation_default_commands: []
  write_validation_commands_by_ext:
    .py:
      - python -m py_compile {path}
parameters:
  type: object
  properties:
    path:
      type: string
      description: Absolute file path to write.
    content:
      type: string
      description: Full file content to write.
  required:
    - path
    - content
governance:
  family: filesystem
  display_name: Filesystem
  description: Write, edit, copy, move, delete, and propose patches for local files.
  actions:
    - id: write
      label: Write File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
        - execution
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true

