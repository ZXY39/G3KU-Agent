schema_version: 1
kind: tool
name: content_describe
display_name: Content Describe
description: Describe one content ref or absolute file path without loading the full body.
tool_result_delivery_contract: runtime_managed
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
parameters:
  type: object
  properties:
    ref:
      type: string
      description: Externalized content ref such as artifact:artifact_xxx.
    path:
      type: string
      description: Absolute file path for path mode. Directories are not supported.
    view:
      type: string
      enum:
        - canonical
        - raw
      description: Content view mode. canonical resolves wrapped refs before reading.
  required: []
governance:
  family: content_navigation
  display_name: Content
  description: Describe, search, and open large externalized content by reference or absolute path.
  actions:
    - id: describe
      label: Describe Content
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true

