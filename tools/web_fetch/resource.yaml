schema_version: 1
kind: tool
name: web_fetch
description: Fetch URL and extract readable content (HTML 鈫?markdown/text).
config_namespace: tools.web
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: true
  filesystem: []
parameters:
  type: object
  properties:
    url:
      type: string
      description: URL to fetch
    extractMode:
      type: string
      enum:
      - markdown
      - text
      default: markdown
    maxChars:
      type: integer
      minimum: 100
  required:
  - url
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
