schema_version: 1
kind: tool
name: web_fetch
description: 抓取 URL 并提取可读内容（HTML 转 markdown/text）。
config_namespace: tools.web
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: true
  filesystem: []
parameters:
  type: object
  properties:
    url:
      type: string
      description: 要抓取的 URL
    extractMode:
      type: string
      enum:
      - markdown
      - text
      default: markdown
    maxChars:
      type: integer
      minimum: 100
  required:
  - url
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
