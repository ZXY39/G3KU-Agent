schema_version: 1
kind: tool
name: web_fetch
display_name: Web Fetch
description: Lightweight HTTP fetch for reading public web pages and extracting readable text without a browser runtime.
tool_result_delivery_contract: runtime_managed
source:
  type: local_adapted
  url: file:///E:/Program/openclaw-2026.3.13-1/src/agents/tools/web-fetch.ts
  ref: openclaw-2026.3.13-1
current_version:
  number: 0.1.1
  released_at: '2026-03-23'
  summary: Initial G3KU-adapted local implementation based on OpenClaw web-fetch.
tool_type: internal
entry:
  module: tools.web_fetch.main.tool
  symbol: build
protocol: mcp
mcp:
  enabled: false
requires: []
permissions:
  network:
    outbound: true
    notes: Only allow public http(s) targets. By default block private networks, loopback, local addresses, and localhost.
  filesystem:
    read: false
    write: false
  shell:
    execute: false
  model:
    invoke: false
  browser:
    interactive: false
parameters_schema:
  type: object
  additionalProperties: false
  required:
    - url
  properties:
    url:
      type: string
      description: Public http(s) URL to fetch.
    max_chars:
      type: integer
      minimum: 500
      maximum: 20000
      default: 6000
      description: Maximum characters of readable text to keep.
    timeout_ms:
      type: integer
      minimum: 1000
      maximum: 30000
      default: 10000
      description: Network timeout in milliseconds.
executor:
  kind: python_object
  symbol: build
parameters:
  type: object
  additionalProperties: false
  required:
    - url
  properties:
    url:
      type: string
      description: Public http(s) URL to fetch.
    max_chars:
      type: integer
      minimum: 500
      maximum: 20000
      default: 6000
      description: Maximum characters of readable text to keep.
    timeout_ms:
      type: integer
      minimum: 1000
      maximum: 30000
      default: 10000
      description: Network timeout in milliseconds.
returns:
  type: object
  properties:
    url:
      type: string
    status_code:
      type: integer
    content_type:
      type: string
    title:
      type: string
    text:
      type: string
behavior_contract:
  summary:
    - Only fetch public http/https resources.
    - By default extract readable text and truncate it to `max_chars`.
    - Invalid URLs, private-network targets, or unsupported schemes return a direct tool error.
    - Timeouts, network failures, and decode failures are returned as tool errors.
governance:
  family: web_fetch
  display_name: Web Fetch
  description: Fetch a public web page over HTTP(S) and return extracted readable text without browser automation.
  actions:
    - id: fetch
      label: Fetch Web Page
      risk_level: medium
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
