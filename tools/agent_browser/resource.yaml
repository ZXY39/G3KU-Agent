schema_version: 1
kind: tool
name: agent_browser
description: Browser automation powered by the external agent-browser CLI. Use this
  tool when the user asks to open sites, search, click, fill forms, log in, read page
  text, take screenshots, or download files. After opening a page, use snapshot before
  interacting, and re-run snapshot after navigation or DOM changes. When the user
  explicitly asks to open a visible browser or watch browser actions, call this tool
  with headless=false. Use headless=true only for background probing or silent browser
  tasks.
config_namespace: tools.agent_browser
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: true
  filesystem: []
parameters:
  type: object
  properties:
    command:
      type: string
      description: Primary agent-browser command, e.g. open, snapshot, click, fill,
        get, wait, cookies, storage, screenshot, state, or close.
    args:
      type: array
      items:
        type: string
      description: 'Positional arguments for the command. Example: command=get, args=[text,
        @e1].'
    session:
      type: string
      description: Optional browser session override. Defaults to the current Nano
        session.
    headless:
      type: boolean
      description: Whether to run in background mode. Use false when the user wants
        to see the browser window.
    timeout_s:
      type: integer
      minimum: 10
      maximum: 3600
      description: Optional command timeout in seconds.
  required:
  - command
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
