schema_version: 1
kind: tool
name: agent_browser
display_name: Agent Browser
description: Internal wrapper around the official agent-browser CLI, installed locally under externaltools/agent_browser with session/profile safeguards and install/update help.
tool_type: internal
source:
  type: git
  url: https://github.com/vercel-labs/agent-browser
  ref: v0.22.2
current_version:
  summary: Internal wrapper plus pinned upstream agent-browser CLI v0.22.2, installed under externaltools/agent_browser.
  compare_rule: Update when the wrapper interface, settings, local install contract, or pinned upstream CLI version changes.
  source_of_truth: This manifest plus tools/agent_browser/main/tool.py and tools/agent_browser/toolskills/SKILL.md.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  paths:
    - externaltools/agent_browser/node_modules/agent-browser/package.json
  env: []
permissions:
  network: true
  filesystem:
    - workspace
settings:
  command_prefix: []
  install_root: externaltools/agent_browser
  browser_root: externaltools/agent_browser/browsers
  temp_root: temp/agent_browser
  default_timeout_seconds: 300
  auto_session: true
  default_session_name: g3ku-agent-browser
  profile_root: .g3ku/tool-data/agent_browser/profiles
  retry_after_session_cleanup: true
  cleanup_on_timeout: true
parameters:
  type: object
  properties:
    mode:
      type: string
      enum:
        - run
        - install_help
        - update_help
      description: Execution mode. Use run for browser commands, install_help for installation guidance, and update_help for upgrade guidance.
    args:
      type: array
      description: CLI arguments forwarded to agent-browser when mode=run.
      items:
        type: string
        description: A single CLI argument.
    cwd:
      type: string
      description: Optional absolute working directory. Defaults to workspace and must stay inside workspace.
    profile:
      type: string
      description: Optional browser profile directory. Relative paths resolve from workspace.
    session_name:
      type: string
      description: Optional browser session name. Defaults to the configured g3ku agent browser session.
    stdin:
      type: string
      description: Optional stdin text passed to the CLI process.
    timeout_seconds:
      type: integer
      description: Optional per-command timeout override in seconds.
  required: []
governance:
  family: agent_browser
  display_name: Agent Browser
  description: Browser automation via the upstream agent-browser CLI.
  actions:
    - id: browse
      label: Browser Automation
      risk_level: medium
      destructive: false
      allowed_roles:
        - ceo
        - execution
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true


