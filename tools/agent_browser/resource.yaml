tool_id: agent_browser
name: agent-browser
slug: agent_browser
tool_type: external
summary: >-
  Register the upstream vercel-labs/agent-browser project as an external browser automation CLI
  for AI agents. The tool is installed outside this repository and exposed through documented
  shell usage rather than vendored source code.
description: >-
  agent-browser is a native Rust-based browser automation CLI distributed primarily through npm,
  Homebrew, and Cargo. It provides a persistent browser daemon plus high-level commands for
  navigation, snapshots, semantic element targeting, input, downloads, screenshots, authentication,
  storage, network interception, and remote CDP/provider connectivity. Because it is an actively
  maintained third-party project with its own release cadence and multi-platform install flows,
  it should be integrated in this repository as an external tool registration rather than copying
  the upstream code into tools/agent_browser/main/.
source:
  type: github
  url: https://github.com/vercel-labs/agent-browser
  owner: vercel-labs
  repo: agent-browser
  default_branch: main
  vcs: git
current_version: 0.20.13
upstream_checked:
  method: git ls-remote --tags + package.json inspection
  package_name: agent-browser
  package_version: 0.20.13
  commit: 0883813cd3cd5072c48d1415b4ae472c3c955666
  checked_at: 2025-02
install:
  mode: external
  primary_method: npm
  supported_methods:
    - npm_global
    - npm_local
    - homebrew_macos
    - cargo
    - source_build
  install_dir:
    npm_global: global package manager location
    npm_local: project-local node_modules/.bin
    homebrew_macos: Homebrew-managed cellar prefix
    cargo: cargo bin directory
    source_build: cloned upstream repository outside workspace
  executable:
    command: agent-browser
    discovery:
      - agent-browser --help
      - agent-browser --version
  post_install:
    - agent-browser install
    - agent-browser install --with-deps   # optional on Linux
runtime:
  interfaces:
    - cli
  transport:
    - stdio
    - background daemon managed by the CLI
  languages:
    - rust
    - javascript (packaging/install scripts only)
  platforms:
    - macos
    - linux
    - windows
  dependencies:
    - Chrome/Chromium or remote CDP/provider target
    - network access for browser/download/provider operations when needed
  state_locations:
    - ~/.agent-browser/
capabilities:
  - open and control web pages through a native CLI
  - accessibility snapshot output with stable refs for agent-friendly interaction
  - click/fill/type/select/keyboard/mouse/tab/frame/dialog operations
  - screenshots, annotated screenshots, PDFs, and diffing
  - cookies, storage, session persistence, auth vault, and profile reuse
  - downloads, network inspection/routing, viewport/device emulation
  - connect to existing browsers via CDP or provider integrations when supported upstream
usage:
  preferred_invocation: agent-browser <command>
  examples:
    - agent-browser open https://example.com
    - agent-browser snapshot -i
    - agent-browser click @e2
    - agent-browser fill @e3 "user@example.com"
    - agent-browser wait --load networkidle
    - agent-browser screenshot --annotate
permissions:
  filesystem: true
  network: true
  browser_automation: true
  subprocess: true
  secrets: true
risk_notes:
  - Can open websites, submit forms, and interact with authenticated browser sessions.
  - Can persist cookies, storage, profiles, or encrypted auth material on disk.
  - Browser/provider usage may contact third-party remote services depending on configuration.
governance:
  maintainer: local workspace operator
  upstream_maintainer: vercel-labs
  review_notes:
    - Treat as external unless a deliberate wrapper/main implementation is later added.
    - Do not vendor upstream repository into tools/agent_browser/main/ just to mirror releases.
    - Keep resource.yaml, version metadata, and toolskills docs aligned on update.
update_strategy:
  check_upstream:
    - git ls-remote --tags https://github.com/vercel-labs/agent-browser.git
    - inspect upstream package.json version and CHANGELOG.md
  upgrade_steps:
    - choose desired upstream release/tag
    - reinstall or upgrade via npm/homebrew/cargo/source outside this repository
    - verify agent-browser --version and basic commands locally
    - update current_version, upstream_checked, and toolskills documentation
artifacts_in_workspace:
  - tools/agent_browser/resource.yaml
  - tools/agent_browser/toolskills/SKILL.md
