schema_version: 1
kind: tool
name: agent_browser
description: 基于外部 agent-browser CLI 的浏览器自动化工具。当用户要求打开网站、搜索、点击、填表、登录、读取页面文本、截图或下载文件时使用。打开页面后先 snapshot 再交互，导航或 DOM 变化后要重新 snapshot。用户明确要求可见浏览器或观看操作时用 headless=false，后台探查或静默任务用 headless=true。
config_namespace: tools.agent_browser
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: true
  filesystem: []
parameters:
  type: object
  properties:
    command:
      type: string
      description: 主命令，例如 open、snapshot、click、fill、get、wait、cookies、storage、screenshot、state、close。
    args:
      type: array
      items:
        type: string
      description: 命令的位置参数数组。示例：command=get，args=[text, @e1]。
    session:
      type: string
      description: 可选：浏览器会话覆盖值，默认当前 Nano 会话。
    headless:
      type: boolean
      description: 是否后台模式。用户希望看到浏览器窗口时使用 false。
    timeout_s:
      type: integer
      minimum: 10
      maximum: 3600
      description: 可选：命令超时时间（秒）。
  required:
  - command
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
