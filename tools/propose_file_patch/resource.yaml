schema_version: 1
kind: tool
name: propose_file_patch
description: 生成统一 diff 风格的补丁工件，不直接修改目标文件。需要可审阅变更时使用。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: 要打补丁的文件路径。
    old_text:
      type: string
      description: 要替换的精确文本，必须唯一匹配。
    new_text:
      type: string
      description: 替换文本。
    summary:
      type: string
      description: 可选：补丁摘要。
  required:
  - path
  - old_text
  - new_text
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
