schema_version: 1
kind: tool
name: orggraph_control_project
description: 暂停、继续、取消或归档已有的 org-graph 项目。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    project_id:
      type: string
      description: 要控制的项目 id。
    action:
      type: string
      enum:
      - pause
      - resume
      - cancel
      - archive
      description: 要执行的控制动作。
  required:
  - project_id
  - action
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
