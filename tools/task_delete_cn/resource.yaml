schema_version: 1
kind: tool
display_name: "任务删除工具"
name: task_delete
description: Preview and delete one or more saved tasks.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local task runtime tool. Handler and governance live with the resource so discovery can refresh without a host restart.
  compare_rule: Treat manifest, main/, parameter contract, or returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    mode:
      type: string
      enum: [preview, confirm]
      description: "`preview` returns candidates and a confirmation token; `confirm` performs deletion."
    任务id列表:
      type: array
      items:
        type: string
      description: Batch task ids to delete.
    confirmation_token:
      type: string
      description: Required in `confirm` mode. Must come from a prior preview of the same batch.
  required: [mode, 任务id列表]
governance:
  family: task_runtime
  display_name: Task Runtime
  description: Preview and delete saved tasks.
  actions:
    - id: delete_cn
      label: Task Delete
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
exposure:
  agent: true
  main_runtime: false
toolskill:
  enabled: true
