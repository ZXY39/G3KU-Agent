schema_version: 1
kind: tool
display_name: "查看任务进度工具"
name: task_progress
description: View task status and stage-aware progress text.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local task runtime tool. Handler and governance live with the resource so discovery can refresh without a host restart.
  compare_rule: Treat manifest, main/, parameter contract, or returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    任务id:
      type: string
      description: Target task id.
  required: [任务id]
governance:
  family: task_runtime
  display_name: Task Runtime
  description: View task progress.
  actions:
    - id: progress_cn
      label: Task Progress
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
exposure:
  agent: true
  main_runtime: false
toolskill:
  enabled: true
