schema_version: 1
kind: tool
name: 查看任务进度工具
description: 按任务 id 返回任务状态和树状图文本，并将任务标记为已读。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    任务id:
      type: string
      description: 目标任务 id。
  required: [任务id]
exposure:
  agent: true
  org_graph: false
toolskill:
  enabled: true
