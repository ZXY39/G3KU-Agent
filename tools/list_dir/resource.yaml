schema_version: 1
kind: tool
name: list_dir
description: List the contents of a directory.
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: The directory path to list
  required:
  - path
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
