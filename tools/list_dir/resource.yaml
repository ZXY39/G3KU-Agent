schema_version: 1
kind: tool
name: list_dir
description: 列出指定目录的内容。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: 要列出的目录路径
  required:
  - path
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
