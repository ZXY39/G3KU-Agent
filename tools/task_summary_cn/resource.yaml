schema_version: 1
kind: tool
display_name: "任务汇总工具"
name: task_summary
description: Summarize total, in-progress, and failed task counts.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local task runtime tool. Handler and governance live with the resource so discovery can refresh without a host restart.
  compare_rule: Treat manifest, main/, parameter contract, or returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties: {}
governance:
  family: task_runtime
  display_name: Task Runtime
  description: Summarize background tasks.
  actions:
    - id: summary_cn
      label: Task Summary
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
exposure:
  agent: true
  main_runtime: false
toolskill:
  enabled: true

