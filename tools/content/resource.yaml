schema_version: 1
kind: tool
name: content
display_name: Content (Legacy)
description: Legacy compatibility wrapper for describe, search, and open operations over large content by ref or absolute file path.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
