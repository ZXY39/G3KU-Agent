schema_version: 1
kind: tool
name: content
display_name: Content (Legacy)
description: Legacy compatibility wrapper for describe, search, and open operations over large content by ref or absolute file path.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local content navigation wrapper. The manifest, handler, and delivery contract together define the current behavior.
  compare_rule: Treat manifest, main/, parameter contract, permissions, settings, and returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
settings:
  restrict_to_workspace: false
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
        - describe
        - search
        - open
        - head
        - tail
      description: Content navigation action.
    ref:
      type: string
      description: Externalized content ref such as artifact:artifact_xxx.
    path:
      type: string
      description: Absolute file path for path mode. Relative paths are rejected. When restrict_to_workspace is enabled, the path must stay inside the workspace.
    query:
      type: string
      description: Search query used by action=search.
    view:
      type: string
      enum:
        - canonical
        - raw
      description: Content view mode. `canonical` resolves wrapped content refs before describe/search/open/head/tail. `raw` reads the wrapper artifact itself.
    limit:
      type: integer
      description: Max hits for action=search.
    before:
      type: integer
      description: Context lines before each hit when action=search.
    after:
      type: integer
      description: Context lines after each hit when action=search.
    start_line:
      type: integer
      description: Start line for action=open.
    end_line:
      type: integer
      description: End line for action=open.
    around_line:
      type: integer
      description: Center line for action=open.
    window:
      type: integer
      description: Window size for action=open when around_line is provided.
    lines:
      type: integer
      description: Number of lines for action=head or action=tail.
  required:
    - action
governance:
  family: content_navigation
  display_name: Content
  description: Describe, search, and open large externalized content by reference or absolute path.
  actions:
    - id: inspect
      label: Inspect Content (Legacy)
      risk_level: low
      destructive: false
      agent_visible: true
      allowed_roles:
        - ceo
        - execution
        - inspection
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true

