  compare_rule: 浠?main/ 瀹炵幇銆乸arameters銆乸ermissions銆乻ettings 鎴栬繑鍥炵粨鏋勫彉鍖栦负鍑嗭紱浠呬慨鏀?toolskills 鏂囨。涓嶅崟鐙涓虹増鏈崌绾с€?
  source_of_truth: 浠ュ綋鍓嶇洰褰曚笅鐨?resource.yaml 涓?main/ 瀹炵幇涓哄噯锛涘瀛樺湪 toolskills/锛屽叾鍐呭鐢ㄤ簬琛ュ厖浣跨敤璇存槑銆?
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
settings:
  restrict_to_workspace: false
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
        - describe
        - search
        - open
        - head
        - tail
      description: Content navigation action.
    ref:
      type: string
      description: Externalized content ref such as artifact:artifact_xxx.
    path:
      type: string
      description: Absolute file path for path mode. Relative paths are rejected. When restrict_to_workspace is enabled, the path must stay inside the workspace.
    query:
      type: string
      description: Search query used by action=search.
    view:
      type: string
      enum:
        - canonical
        - raw
      description: Content view mode. `canonical` resolves wrapped content refs before describe/search/open/head/tail. `raw` reads the wrapper artifact itself.
    limit:
      type: integer
      description: Max hits for action=search.
    before:
      type: integer
      description: Context lines before each hit when action=search.
    after:
      type: integer
      description: Context lines after each hit when action=search.
    start_line:
      type: integer
      description: Start line for action=open.
    end_line:
      type: integer
      description: End line for action=open.
    around_line:
      type: integer
      description: Center line for action=open.
    window:
      type: integer
      description: Window size for action=open when around_line is provided.
    lines:
      type: integer
      description: Number of lines for action=head or action=tail.
  required:
    - action
governance:
  family: content_navigation
  display_name: Content
  description: Describe, search, and open large externalized content by reference or absolute path.
  actions:
    - id: inspect
      label: Inspect Content (Legacy)
      risk_level: low
      destructive: false
      agent_visible: true
      allowed_roles:
        - ceo
        - execution
        - inspection
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true

