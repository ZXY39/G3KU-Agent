schema_version: 1
kind: tool
name: file_vault_read
description: '通过占位符读取已上传文件内容。

  对图片和支持的文件类型，本工具可以直接返回多模态内容块给模型。

  必须调用：当已知占位符且回答需要实际文件内容时；包括继续阅读、使用这些占位符、读取文件本体等后续意图。

  不要等以后再读：如果当前回合已经知道占位符，就在本回合调用。

  避免调用：仅需确认存在/列表而不需要读取内容时。'
config_namespace: tools.file_vault
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    placeholder:
      type: string
      description: 规范化的文件占位符。
    mode:
      type: string
      enum:
      - auto
      - text
      - binary_meta
      description: 读取模式。
    max_chars:
      type: integer
      minimum: 256
      maximum: 200000
      description: 文本模式下返回的最大字符数。
  required:
  - placeholder
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
