schema_version: 1
kind: tool
name: message
description: Send a message to the user when the workflow must communicate through an external channel.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local messaging tool. The manifest, handler, and delivery contract together define the current behavior.
  compare_rule: Treat manifest, main/, parameter contract, permissions, settings, and returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    content:
      type: string
      description: Message content to send.
    channel:
      type: string
      description: Optional target channel, for example Telegram or Discord.
    chat_id:
      type: string
      description: Optional target chat or user id.
    media:
      type: array
      items:
        type: string
      description: Optional attachment paths to include, such as images, audio, or documents.
  required:
  - content
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
