schema_version: 1
kind: tool
name: message
description: 向用户发送消息，需要与外部渠道沟通时使用。
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    content:
      type: string
      description: 要发送的消息内容
    channel:
      type: string
      description: 可选：目标渠道（telegram、discord 等）
    chat_id:
      type: string
      description: 可选：目标聊天/用户 ID
    media:
      type: array
      items:
        type: string
      description: 可选：要附加的文件路径列表（图片、音频、文档）
  required:
  - content
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
