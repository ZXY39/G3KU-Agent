schema_version: 1
kind: tool
name: memory_runtime
description: Internal memory runtime settings anchor.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local memory runtime tool. The manifest, handler, and returned
    payload contract together define the current behavior.
  compare_rule: Treat manifest, main/, parameter contract, permissions, settings,
    and returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective
    behavior.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
settings:
  enabled: true
  mode: dual
  backend: rag
  arch_version: v2
  document:
    summary_max_chars: 100
    document_max_chars: 10000
    memory_file: memory/MEMORY.md
    notes_dir: memory/notes
  queue:
    queue_file: memory/queue.jsonl
    ops_file: memory/ops.jsonl
    batch_max_chars: 50000
    max_wait_seconds: 3
    review_interval_turns: 10
  agent:
    model_key: ""
    repair_attempt_limit: 1
  features:
    unified_context: true
    layered_loading: true
    query_planner: true
    commit_pipeline: true
    split_store: true
    observability: true
  checkpointer:
    backend: sqlite
    path: memory/checkpoints.sqlite3
  store:
    backend: hybrid
    qdrant_path: memory/qdrant
    qdrant_collection: nanobot_memory_v1
    sqlite_path: memory/memory.db
  retrieval:
    dense_top_k: 24
    sparse_top_k: 24
    fused_top_k: 12
    context_top_k: 8
    sentence_window: 3
    max_context_tokens: 1200
    default_load_level: l1
  embedding:
    batch_size: 32
  isolation:
    mode: global
    namespace_template:
    - memory
    - global
  guard:
    mode: tiered
    auto_fact_confidence: 0.8
  compat:
    dual_write_legacy_files: true
  commit:
    turn_trigger: 20
    idle_minutes_trigger: 360
  cost:
    max_increase_pct: 15
  assembly:
    recent_messages_limit: 24
    archive_summary_top_k: 2
    archive_summary_max_tokens: 320
    skill_inventory_top_k: 16
    skill_inventory_max_tokens: 480
    extension_tool_top_k: 16
    core_tools:
    - content
    - create_async_task
    - task_summary
    - task_list
    - task_progress
    - memory_write
    - memory_delete
    - memory_note
    - message
    - task_runtime
    - skill_access
  catalog_summary:
    model_key: ceo_primary
  bootstrap_mode: new_only
  retention_days: null
parameters:
  type: object
  properties: {}
exposure:
  agent: false
  main_runtime: false
toolskill:
  enabled: false
