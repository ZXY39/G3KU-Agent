schema_version: 1
kind: tool
display_name: "\u83b7\u53d6\u4efb\u52a1"
name: task_list
description: 按任务类型返回任务 id 列表和简要描述。
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: 当前版本表示仓库内置实现；更新时需同步代码、参数契约和资源描述。
  compare_rule: 以 main/ 实现、parameters、permissions、settings 或返回结构变化为准；仅修改 toolskills 文案不单独视为版本升级。
  source_of_truth: 以当前目录下的 resource.yaml 与 main/ 实现为准；如存在 toolskills/，其内容用于补充使用说明。
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    任务类型:
      type: integer
      enum: [1, 2, 3, 4]
      description: 1=所有任务，2=进行中任务，3=失败任务，4=未读任务。
  required: [任务类型]
exposure:
  agent: true
  main_runtime: false
toolskill:
  enabled: true
