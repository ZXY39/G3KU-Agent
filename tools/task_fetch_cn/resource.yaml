schema_version: 1
kind: tool
display_name: "获取任务"
name: task_list
description: List task ids for a requested task category.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local task runtime tool. Handler and governance live with the resource so discovery can refresh without a host restart.
  compare_rule: Treat manifest, main/, parameter contract, or returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    任务类型:
      type: integer
      enum: [1, 2, 3, 4]
      description: "1=all tasks, 2=in progress, 3=failed, 4=unread."
  required: [任务类型]
governance:
  family: task_runtime
  display_name: Task Runtime
  description: List background tasks.
  actions:
    - id: list_cn
      label: Task List
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
exposure:
  agent: true
  main_runtime: false
toolskill:
  enabled: true
