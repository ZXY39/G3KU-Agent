schema_version: 1
kind: tool
name: task_monitor_progress
description: 查看单个任务详情，包括状态、树文本、节点输出、日志和最新检查输出。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    task_id:
      type: string
      description: 目标任务/项目 ID。
  required:
  - task_id
exposure:
  agent: false
  org_graph: true
toolskill:
  enabled: true
