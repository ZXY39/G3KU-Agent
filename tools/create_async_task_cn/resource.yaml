schema_version: 1
kind: tool
display_name: "创建异步任务"
name: create_async_task
description: 把用户需求转交为后台异步任务，并可按需声明最终结果是否需要验收。
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: 当前版本表示仓库内置实现；更新时需同步代码、参数契约和资源描述。
  compare_rule: 以 main/ 实现、parameters、permissions、settings 或返回结构变化为准；仅修改 toolskills 文案不单独视为版本升级。
  source_of_truth: 以当前目录下的 resource.yaml 与 main/ 实现为准；如存在 toolskills/，其内容用于补充使用说明。
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    task:
      type: string
      description: 用户的原始需求。
    requires_final_acceptance:
      type: boolean
      description: 是否需要在 root execution 完成后再做最终验收。
    final_acceptance_prompt:
      type: string
      description: 最终验收提示词。仅当 requires_final_acceptance=true 时必填。
  required: [task]
exposure:
  agent: true
  main_runtime: false
toolskill:
  enabled: true
