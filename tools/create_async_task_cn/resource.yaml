schema_version: 1
kind: tool
display_name: "创建异步任务"
name: create_async_task
description: Create a background task in the main runtime.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local task runtime tool. Handler and governance live with the resource so discovery can refresh without a host restart.
  compare_rule: Treat manifest, main/, parameter contract, or returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    task:
      type: string
      description: User request to dispatch as a background task.
    core_requirement:
      type: string
      description: One-sentence distilled core requirement for the task tree.
    execution_policy:
      type: [object, string]
      description: Execution policy for the task.
      properties:
        mode:
          type: string
          enum: [focus, coverage]
          description: "`focus` for highest-value direct work, `coverage` to allow broader completion."
      required: [mode]
    file_targets:
      type: [array, "null"]
      description: Optional reopen targets for files or artifacts needed by the task. Use `null` or `[]` when no specific files are required.
      items:
        type: object
        properties:
          path:
            type: [string, "null"]
            description: Exact absolute file path to reopen.
          ref:
            type: [string, "null"]
            description: Exact artifact or content ref to reopen.
    requires_final_acceptance:
      type: boolean
      description: Whether the root execution should be followed by final acceptance.
    final_acceptance_prompt:
      type: string
      description: Required when `requires_final_acceptance=true`.
  required: [task, core_requirement, execution_policy]
governance:
  family: task_runtime
  display_name: Task Runtime
  description: Create background tasks in the main runtime.
  actions:
    - id: create_async_task
      label: Create Async Task
      risk_level: medium
      destructive: false
      allowed_roles:
        - ceo
exposure:
  agent: true
  main_runtime: false
toolskill:
  enabled: true

