schema_version: 1
kind: tool
name: file_vault_set_policy
description: 更新文件库最大存储和清理阈值。仅在用户明确要求调整策略时调用。
config_namespace: tools.file_vault
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    max_storage_gb:
      type: number
      minimum: 0.1
      maximum: 1024
      description: 新的最大存储（GB）。
    threshold_pct:
      type: integer
      minimum: 10
      maximum: 95
      description: 触发清理的阈值百分比。
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
