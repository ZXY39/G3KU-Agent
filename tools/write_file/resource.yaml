schema_version: 1
kind: tool
name: write_file
description: Write content to a file at the given path. Creates parent directories
  if needed.
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: The file path to write to
    content:
      type: string
      description: The content to write
  required:
  - path
  - content
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
