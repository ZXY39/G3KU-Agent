schema_version: 1
kind: tool
name: write_file
description: 将内容写入指定路径文件，必要时创建父目录。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: 要写入的文件路径
    content:
      type: string
      description: 要写入的内容
  required:
  - path
  - content
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
