schema_version: 1
kind: tool
name: memory_delete
description: Queue durable long-term memory deletions using visible memory ids.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Repository-managed queued memory delete tool for id-based removals.
  compare_rule: Treat changes in main implementation, parameters, permissions, settings, or return payload shape as version changes.
  source_of_truth: This resource.yaml and the main implementation are authoritative; toolskills supplement usage guidance when present.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    id:
      type: string
      description: A single memory id visible in the current MEMORY snapshot that should be removed.
    ids:
      type: array
      items:
        type: string
      description: A list of memory ids visible in the current MEMORY snapshot that should be removed.
  anyOf:
    - required:
        - id
    - required:
        - ids
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
