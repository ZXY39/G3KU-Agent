schema_version: 1
kind: tool
name: memory_delete
description: Queue durable long-term memory deletions using visible memory text.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Repository-managed queued memory delete tool for visible text removals.
  compare_rule: Treat changes in main implementation, parameters, permissions, settings, or return payload shape as version changes.
  source_of_truth: This resource.yaml and the main implementation are authoritative; toolskills supplement usage guidance when present.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    target_text:
      type: string
      description: Memory text visible in the current MEMORY snapshot that should be removed.
  required:
    - target_text
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
