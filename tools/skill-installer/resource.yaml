schema_version: 1
kind: tool
name: skill-installer
display_name: Skill Installer
description: Install or import a skill from a GitHub repo/path into the current workspace skills directory, generating a minimal G3KU resource manifest when the upstream skill only ships SKILL.md.
source:
  type: builtin-wrapper
  url: https://github.com/openai/skills/tree/main/skills/.system/skill-installer
  ref: main
current_version:
  summary: 当前版本是仓库内置封装；实现 GitHub 下载、git 稀疏检出、工作区安装与缺失 resource.yaml 的自动补齐，并针对 Windows 锁文件场景改为分离 clone 目录且忽略临时目录清理残留错误，同时接入统一强取消能力。
  compare_rule: 以 main/ 实现、参数契约、目标目录规则或自动生成 resource.yaml 的行为变化为准；仅修改 toolskills 文案不单独视为版本升级。
  source_of_truth: 以当前目录下的 resource.yaml 与 main/ 实现为准；toolskills/ 用于补充来源、参数约束和失败处理。
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: true
  filesystem:
    - workspace
settings:
  download_timeout: 30
  git_timeout: 120
  auto_prefer: git
parameters:
  type: object
  properties:
    url:
      type: string
      description: Full GitHub tree/blob URL pointing at the skill directory or SKILL.md.
    repo:
      type: string
      description: GitHub repo in owner/repo form. Use together with path.
    path:
      type: string
      description: Relative path to the skill directory inside the repo. Required when repo is used.
    ref:
      type: string
      description: Optional git ref. Defaults to main.
    dest:
      type: string
      description: Optional destination directory. Relative paths resolve from workspace. Defaults to skills/<basename>.
    name:
      type: string
      description: Optional local skill id used when generating a missing resource.yaml. Existing upstream resource.yaml names are preserved.
    method:
      type: string
      enum:
        - auto
        - download
        - git
      description: 下载策略。auto 会遵循 settings.auto_prefer；当前默认优先 git sparse checkout，失败后回退到 GitHub codeload zip。
  required: []
governance:
  family: skill-installer
  display_name: Skill Installer
  description: Install an existing skill from GitHub into the current workspace.
  actions:
    - id: install
      label: Install Skill
      risk_level: medium
      destructive: true
      allowed_roles:
        - ceo
        - execution
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
