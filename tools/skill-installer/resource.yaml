schema_version: 1
kind: tool
name: skill-installer
display_name: Skill Installer
description: Install or import a skill from a GitHub repo/path into the current workspace
  skills directory, generating a minimal G3KU resource manifest when the upstream
  skill only ships SKILL.md.
tool_result_delivery_contract: runtime_managed
source:
  type: builtin-wrapper
  url: https://github.com/openai/skills/tree/main/skills/.system/skill-installer
  ref: main
current_version:
  summary: Resource-local skill installer. The manifest, handler, installation workflow,
    and cancellation behavior together define the current behavior.
  compare_rule: Treat changes in main/, parameter contract, target directory rules,
    generated resource.yaml behavior, or cancellation handling as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective
    behavior.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: true
  filesystem:
  - workspace
settings:
  download_timeout: 30
  git_timeout: 120
  auto_prefer: git
parameters:
  type: object
  properties:
    url:
      type: string
      description: Full GitHub tree/blob URL pointing at the skill directory or SKILL.md.
    repo:
      type: string
      description: GitHub repo in owner/repo form. Use together with path.
    path:
      type: string
      description: Relative path to the skill directory inside the repo. Required
        when repo is used.
    ref:
      type: string
      description: Optional git ref. Defaults to main.
    dest:
      type: string
      description: Optional destination directory. Relative paths resolve from workspace.
        Defaults to skills/<basename>.
    name:
      type: string
      description: Optional local skill id used when generating a missing resource.yaml.
        Existing upstream resource.yaml names are preserved.
    method:
      type: string
      enum:
      - auto
      - download
      - git
      description: ТХЊтгГТхЄу╗ЏТаФТџљжієС┐Џuto Тх╝Т░ХС╝њт»░?settings.auto_preferжћЏТХўуХІжЇЊтХЅу▓»уњЂсѓёу┤ГжЇЈ?git sparse checkoutжћЏт▒йсЂЉуњљсЃЦТѓЌжЇЦуѓ║РѓгРѓгжЇњ?GitHub
        codeload zipжіє?
  required: []
governance:
  family: skill-installer
  display_name: Skill Installer
  description: Install an existing skill from GitHub into the current workspace.
  actions:
  - id: install
    label: Install Skill
    risk_level: medium
    destructive: true
    allowed_roles:
    - ceo
    - execution
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
