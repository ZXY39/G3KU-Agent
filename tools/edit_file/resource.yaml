schema_version: 1
kind: tool
name: edit_file
description: 通过将 old_text 替换为 new_text 来编辑文件，old_text 必须在文件中唯一匹配。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: 要编辑的文件路径
    old_text:
      type: string
      description: 要精确匹配并替换的文本
    new_text:
      type: string
      description: 替换后的文本
  required:
  - path
  - old_text
  - new_text
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
