schema_version: 1
kind: tool
name: edit_file
description: Edit a file by replacing old_text with new_text. The old_text must exist
  exactly in the file.
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: The file path to edit
    old_text:
      type: string
      description: The exact text to find and replace
    new_text:
      type: string
      description: The text to replace with
  required:
  - path
  - old_text
  - new_text
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
