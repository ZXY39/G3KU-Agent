schema_version: 1
kind: tool
name: task_monitor_list
description: 列出全部/进行中/失败/未读的任务及简要说明。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    scope:
      type: integer
      enum:
      - 1
      - 2
      - 3
      - 4
      description: 1=全部，2=进行中，3=失败，4=未读进度
  required:
  - scope
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
