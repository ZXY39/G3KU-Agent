schema_version: 1
kind: tool
name: load_tool_context
description: Load detailed context for a visible tool or registered external tool, or search visible tool candidates with natural-language search_query.
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Current version is the repository-managed implementation; updates must keep code, parameter contract, and resource metadata in sync.
  compare_rule: Treat changes in main/ implementation, parameters, permissions, settings, or return payload shape as version changes; toolskills-only doc edits do not count as upgrades by themselves.
  source_of_truth: This resource.yaml and the main/ implementation are authoritative; toolskills/ supplements usage guidance when present.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    tool_id:
      type: string
      description: Optional tool family id or executor tool name to load directly.
    search_query:
      type: string
      description: Optional natural-language query used to search visible tool candidates when tool_id is omitted.
    limit:
      type: integer
      description: Optional candidate limit for search mode. Defaults to 5.
    level:
      type: string
      enum: [l0, l1, l2]
      description: Requested context level for detail mode. Defaults to l1.
    query:
      type: string
      description: Optional query used to extract a focused L2 excerpt for detail mode.
    max_tokens:
      type: integer
      description: Optional output token budget.
  required: []
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
