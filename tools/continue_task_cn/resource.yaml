schema_version: 1
kind: tool
display_name: "继续任务"
name: continue_task
description: Continue an existing task in exactly one controlled mode.
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local continuation tool for recreate or in-place retry.
  compare_rule: Treat manifest, main/, parameter contract, or returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    mode:
      type: string
      enum: [recreate, retry_in_place]
      description: Choose `recreate` to start a new continuation task or `retry_in_place` to resume the current task in place.
    target_task_id:
      type: string
      description: Existing task id to continue. Must use `task:...`.
    continuation_instruction:
      type: string
      description: Continuation directive used as recreate prompt or in-place retry context.
    execution_policy:
      type: [object, string]
      description: Optional execution policy override.
      properties:
        mode:
          type: string
          enum: [focus, coverage]
          description: "`focus` for highest-value direct work, `coverage` to allow broader completion."
      required: [mode]
    requires_final_acceptance:
      type: boolean
      description: Whether the continuation should require final acceptance.
    final_acceptance_prompt:
      type: string
      description: Required when `requires_final_acceptance=true`.
    reuse_existing:
      type: boolean
      description: Reuse an in-progress recreated continuation task when possible.
    reason:
      type: string
      description: Short continuation reason such as heartbeat_stall or manual_retry.
  required: [mode, target_task_id, continuation_instruction]
governance:
  family: task_runtime
  display_name: Task Runtime
  description: Continue existing tasks in the main runtime.
  actions:
    - id: continue_task
      label: Continue Task
      risk_level: medium
      destructive: false
      allowed_roles:
        - ceo
exposure:
  agent: true
  main_runtime: false
toolskill:
  enabled: true

