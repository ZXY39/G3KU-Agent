schema_version: 1
kind: tool
name: read_file
description: 读取指定路径的文件内容。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
  - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: 要读取的文件路径
  required:
  - path
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
