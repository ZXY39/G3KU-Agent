schema_version: 1
kind: tool
name: filesystem_search
display_name: Filesystem Search
description: Search a file or directory subtree for text.
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
parameters:
  type: object
  properties:
    path:
      type: string
      description: Absolute file or directory path to search.
    query:
      type: string
      description: Search query.
    limit:
      type: integer
      description: Optional max hits.
    before:
      type: integer
      description: Optional context lines before each file hit.
    after:
      type: integer
      description: Optional context lines after each file hit.
  required:
    - path
    - query
governance:
  family: filesystem
  display_name: Filesystem
  description: Describe, search, open, list, write, edit, delete, and patch local files.
  actions:
    - id: search
      label: Search Path
      risk_level: low
      destructive: false
      allowed_roles:
        - ceo
        - execution
        - inspection
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true
