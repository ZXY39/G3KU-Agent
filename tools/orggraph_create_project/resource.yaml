schema_version: 1
kind: tool
name: orggraph_create_project
description: 创建 org-graph 后台项目，用于长时间或多步骤任务。
config_namespace: ''
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    prompt:
      type: string
      description: 要在后台执行的项目请求。
    preferred_title:
      type: string
      description: 可选：项目短标题。
    output_target:
      type: string
      description: 可选：输出目标标识。
  required:
  - prompt
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
