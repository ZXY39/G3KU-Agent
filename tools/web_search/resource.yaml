schema_version: 1
kind: tool
name: web_search
description: 网页搜索，返回标题、URL 和摘要。
config_namespace: tools.web
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: true
  filesystem: []
parameters:
  type: object
  properties:
    query:
      type: string
      description: 搜索关键词
    count:
      type: integer
      description: 返回结果数量（1-10）
      minimum: 1
      maximum: 10
  required:
  - query
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
