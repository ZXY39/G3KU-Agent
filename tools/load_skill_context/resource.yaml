schema_version: 1
kind: tool
name: load_skill_context
description: 加载当前可见技能的分层上下文。默认返回 L1 概览；可用 level=l2 + query 获取聚焦摘录。
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: 当前版本表示仓库内置实现；更新时需同步代码、参数契约和资源描述。
  compare_rule: 以 main/ 实现、parameters、permissions、settings 或返回结构变化为准；仅修改 toolskills 文案不单独视为版本升级。
  source_of_truth: 以当前目录下的 resource.yaml 与 main/ 实现为准；如存在 toolskills/，其内容用于补充使用说明。
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    skill_id:
      type: string
      description: 要加载的 skill id。
    level:
      type: string
      enum: [l0, l1, l2]
      description: 请求的上下文层级。默认 l1。
    query:
      type: string
      description: 可选：用于提取聚焦 L2 摘录的查询。
    max_tokens:
      type: integer
      description: 可选的返回 token 预算。
  required:
  - skill_id
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
