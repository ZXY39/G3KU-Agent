schema_version: 1
kind: tool
name: load_skill_context
description: Load full context for a visible skill by exact skill_id. This tool is not a skill discovery interface.
tool_result_delivery_contract: direct_load_inline
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Current version is the repository-managed implementation; updates must keep code, parameter contract, and resource metadata in sync.
  compare_rule: Treat changes in main/ implementation, parameters, permissions, settings, or return payload shape as version changes; toolskills-only doc edits do not count as upgrades by themselves.
  source_of_truth: This resource.yaml and the main/ implementation are authoritative; toolskills/ supplements usage guidance when present.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
