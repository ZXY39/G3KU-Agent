schema_version: 1
kind: tool
name: filesystem_edit
display_name: Filesystem Edit
description: Edit one file by resolving a target span or using legacy text-replace or line-range inputs.
tool_result_delivery_contract: runtime_managed
protocol: mcp
mcp:
  transport: embedded
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem:
    - workspace
settings:
  restrict_to_workspace: false
  edit_validation_enabled: true
  edit_validation_timeout_seconds: 20
  edit_validation_rollback_on_failure: true
  edit_validation_default_commands: []
  edit_validation_commands_by_ext:
    .py:
      - python -m py_compile {path}
parameters:
  type: object
  properties:
    path:
      type: string
      description: Absolute file path to edit.
    target:
      type: object
      description: Preferred target-first edit locator.
      properties:
        by:
          type: string
          enum:
            - exact_text
            - anchor_pair
            - line_range
          description: How to locate the existing region to replace.
        text:
          type: string
          description: Existing text when target.by=exact_text.
        start_anchor:
          type: string
          description: Starting anchor when target.by=anchor_pair.
        end_anchor:
          type: string
          description: Ending anchor when target.by=anchor_pair.
        start_line:
          type: integer
          description: Start line when target.by=line_range.
        end_line:
          type: integer
          description: End line when target.by=line_range.
      required:
        - by
    mode:
      type: string
      enum:
        - text_replace
        - line_range
      description: Legacy explicit edit mode. Use only for backward-compatible text_replace or line_range calls.
    old_text:
      type: string
      description: Existing text for legacy text-replace mode.
    new_text:
      type: string
      description: Replacement text for target-first or legacy text-replace mode.
    start_line:
      type: integer
      description: Start line for legacy line-range mode.
    end_line:
      type: integer
      description: End line for legacy line-range mode.
    replacement:
      type: string
      description: Replacement text for legacy line-range mode.
  required:
    - path
model_parameters:
  type: object
  properties:
    path:
      type: string
      description: Absolute file path to edit.
    target:
      type: object
      description: Preferred target-first edit locator.
      properties:
        by:
          type: string
          enum:
            - exact_text
            - anchor_pair
            - line_range
          description: How to locate the existing region to replace.
        text:
          type: string
          description: Existing text when target.by=exact_text.
        start_anchor:
          type: string
          description: Starting anchor when target.by=anchor_pair.
        end_anchor:
          type: string
          description: Ending anchor when target.by=anchor_pair.
        start_line:
          type: integer
          description: Start line when target.by=line_range.
        end_line:
          type: integer
          description: End line when target.by=line_range.
      required:
        - by
    new_text:
      type: string
      description: Replacement text for the resolved target region.
  required:
    - path
    - target
    - new_text
governance:
  family: filesystem
  display_name: Filesystem
  description: Write, edit, copy, move, delete, and propose patches for local files.
  actions:
    - id: edit
      label: Edit File
      risk_level: high
      destructive: true
      allowed_roles:
        - ceo
        - execution
exposure:
  agent: true
  main_runtime: true
toolskill:
  enabled: true

