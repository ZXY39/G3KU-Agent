schema_version: 1
kind: tool
name: file_vault_stats
description: Return file vault capacity, usage, and most-used files.
config_namespace: tools.file_vault
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    top_n:
      type: integer
      minimum: 1
      maximum: 50
      description: How many top-used files to include.
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
