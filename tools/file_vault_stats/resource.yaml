schema_version: 1
kind: tool
name: file_vault_stats
description: 返回文件库容量、使用情况和占用最多的文件。
config_namespace: tools.file_vault
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    top_n:
      type: integer
      minimum: 1
      maximum: 50
      description: 返回占用最多文件的数量。
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
