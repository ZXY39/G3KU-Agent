schema_version: 1
kind: tool
name: cron
description: "Schedule internal reminders for future agent turns. Actions: `add`, `list`, `remove`. Repeating reminders stop after `max_runs` successful deliveries and default to one-shot when omitted."
tool_result_delivery_contract: runtime_managed
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: Resource-local cron tool. The manifest, handler, and scheduling contract together define the current behavior.
  compare_rule: Treat manifest, main/, parameter contract, permissions, settings, and returned payload changes as version-relevant.
  source_of_truth: resource.yaml, main/, and toolskills together define the effective behavior.
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
      - add
      - list
      - remove
      description: Action to execute.
    message:
      type: string
      description: Internal reminder content for the future agent. Describe the action to take, not the final user-facing reply.
    max_runs:
      type: integer
      description: Maximum successful reminder deliveries before automatic deletion. Omitted values default to one-shot; `at` reminders always use 1.
    stop_condition:
      type: string
      description: Deprecated compatibility field. Reminder stopping is controlled by `max_runs`.
    every_seconds:
      type: integer
      description: Interval in seconds for recurring tasks.
    cron_expr:
      type: string
      description: Cron expression, for example `0 9 * * *`.
    tz:
      type: string
      description: IANA time zone for the cron expression, for example `America/Vancouver`.
    at:
      type: string
      description: One-shot ISO datetime, for example `2026-02-12T10:30:00`.
    job_id:
      type: string
      description: Task id used by `remove`.
  required:
  - action
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
