schema_version: 1
kind: tool
name: cron
description: 安排提醒和周期任务。动作：add、list、remove。
source:
  type: ''
  url: ''
  ref: ''
current_version:
  summary: ?????????????????
  compare_rule: ???????????????????????????????toolskill ????????????????
  source_of_truth: ????????????resource.yaml ? toolskills ?????
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
      - add
      - list
      - remove
      description: 要执行的动作
    message:
      type: string
      description: 提醒消息（用于 add）
    every_seconds:
      type: integer
      description: 周期任务的间隔秒数
    cron_expr:
      type: string
      description: Cron 表达式，例如 '0 9 * * *'（定时任务）
    tz:
      type: string
      description: Cron 表达式的 IANA 时区（例如 'America/Vancouver'）
    at:
      type: string
      description: 一次性执行的 ISO datetime（例如 '2026-02-12T10:30:00'）
    job_id:
      type: string
      description: 任务 ID（用于 remove）
  required:
  - action
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
