schema_version: 1
kind: tool
name: file_vault_cleanup
description: 执行文件库清理。建议先使用 dry_run=true 预览删除内容。
config_namespace: tools.file_vault
requires:
  tools: []
  bins: []
  env: []
permissions:
  network: false
  filesystem: []
parameters:
  type: object
  properties:
    dry_run:
      type: boolean
      description: 仅预览，不删除文件。
    target_pct:
      type: integer
      minimum: 1
      maximum: 95
      description: 可选：清理后目标占用百分比。
exposure:
  agent: true
  org_graph: true
toolskill:
  enabled: true
